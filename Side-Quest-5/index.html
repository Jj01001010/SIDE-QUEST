<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI JS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex px-15 py-10 h-screen flex-col items-center justify-center">
    <main class="bg-green-300 px-10 py-3 h-50 rounded-lg text-gray-900">
        <h1 class="pb-8 mt-3 text-3xl font-bold">BMI Calculator</h1>
        <section>
            <form action="submit" class="myForm">
                <input class="height border-1 border-black rounded-sm p-1 text-lg px-2" type="text"
                    placeholder="Height">
                <input class="weight border-1 rounded-sm p-1 text-lg px-2" type="text" placeholder="Weight">
                <button class="text-lg py-1 px-2 rounded-sm border cursor-pointer">Calculate</button>
            </form>
        </section>
        <section>
            <p class="result-el mt-5 text-xl font-semibold">~</p>
        </section>
    </main>
    <script src="bmi.js"></script>
</body>

</html>
