<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTrackSavingS</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>
    <div>
        <p class="main-tag">iTrackSavings</p>
    </div>
    <form class="transaction-form">
        <input type="text" placeholder="Category: Food" class="category" required>
        <input type="number" placeholder="Amount: ₱9999" class="amount" required>
        
        <select required class="type">
            <option value="Income" class="type" >Income</option>
            <option value="Expense" class="type" >Expense</option>
        </select>

        <button class="submit-btn" type="submit">
            <i class="fa-solid fa-circle-plus"></i>
        </button>
    </form>
    <div class="container"></div>
    <div class="balance-container">
        <p class="expense-balance"></p>
        <p class="income-balance"></p>
        <p class="total"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
